services:
  - type: web
    name: ai-nexus-dashboard
    env: python
    plan: standard
    region: oregon
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
    healthCheckPath: /api/health
    autoDeploy: true

  - type: worker
    name: ai-nexus-worker
    env: python
    plan: standard
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python src/main.py --worker
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
